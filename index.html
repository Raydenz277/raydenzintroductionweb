  const wrapper = document.getElementById('sections-wrapper');

  function createSection(item) {
    const sec = document.createElement('div');
    sec.className = `section ${item.position}`;
    // Random vertical position for asymmetry
    sec.style.top = Math.random() * 150 + 100 + 'px';
    // Add large handwritten background word
    const decorWord = document.createElement('div');
    decorWord.className = 'decor-word';
    decorWord.innerText = item.title;
    sec.appendChild(decorWord);
    // Add large outlined heading
    const heading = document.createElement('div');
    heading.className = 'heading';
    heading.innerText = item.title;
    sec.appendChild(heading);
    // Add text
    const text = document.createElement('div');
    text.innerHTML = item.text;
    sec.appendChild(text);
    // Animate on scroll
    sec.style.opacity = 0;
    return sec;
  }

  let currentLang = localStorage.getItem('lang') || 'en';

  function renderSections() {
    wrapper.innerHTML = '';
    const data = contentData[currentLang];
    data.forEach(item => {
      const sec = createSection(item);
      wrapper.appendChild(sec);
    });
    // Animate in
    setTimeout(() => {
      document.querySelectorAll('.section').forEach(s => {
        s.classList.add('visible');
        s.style.opacity = 1;
        s.style.transform = 'translateY(0)';
      });
    }, 100);
  }

  document.getElementById('lang-toggle').addEventListener('click', () => {
    currentLang = currentLang === 'en' ? 'vi' : 'en';
    localStorage.setItem('lang', currentLang);
    renderSections();
    document.getElementById('lang-toggle').innerText = currentLang === 'en' ? '🌐 Tiếng Việt' : '🌐 English';
  });

  // Initialize
  renderSections();

  // Animate on scroll: fade-in effect
  window.addEventListener('scroll', () => {
    document.querySelectorAll('.section').forEach(sec => {
      const rect = sec.getBoundingClientRect();
      if(rect.top < window.innerHeight - 50) {
        sec.classList.add('visible');
        sec.style.opacity = 1;
        sec.style.transform = 'translateY(0)';
      }
    });
  });
</script>
